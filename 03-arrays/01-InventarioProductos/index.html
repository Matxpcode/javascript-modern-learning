<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <!-- Formulario de producto -->
        <form class="bg-dark bg-gradient text-white p-5 border rounded" id="formulario">
            
            <!-- Boton para ver Productos: Primer, Ultimo y Total -->
            <button type="button" class="mb-3 btn btn-primary disabled-custom" id="verProd">
                Productos Agregados <span class="badge text-bg-secondary" id="numeroProd">0</span>
            </button>

            <div class="mb-3">
                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                <input name="nombre" class="form-control" id="nombre">
            </div>
            <div class="mb-3">
                <label for="precio" class="form-label fw-semibold">Precio</label>
                <input name="precio" class="form-control" id="precio">
            </div>

            <!-- Boton para agregar producto nuevo -->
            <button type="submit" class="btn btn-primary text-white fw-semibold">Agregar Producto</button>
        </form>

        <!-- Tarjeta de respuesta -->
        <div class="card p-3 m-5 d-none" id="tarjeta">
            <div class="card-header fw-semibold" id="cabecera"></div>
            <div class="card-body">
                <p class="card-text" id="resultado"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="registrar.js"></script> 
</body>

</html>
