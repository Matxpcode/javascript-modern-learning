<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex align-items-center justify-content-center border vh-100 gap-5">

        <form class="bg-dark text-white p-4 border rounded shadow-sm w-25" id="formulario">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input name="nombre" class="form-control" id="nombre">
            </div>
            <div class="mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <input name="categoria" class="form-control" id="categoria">
            </div>
            <div class="mb-3">
                <label for="precio" class="form-label">Precio</label>
                <input name="precio" class="form-control" id="precio">
            </div>
            <div class="mb-3">
                <label for="stock" class="form-label">Stock</label>
                <input name="stock" class="form-control" id="stock">
            </div>
            <div class="mb-3 form-check">
                <input name="activo" type="checkbox" class="form-check-input" id="activo">
                <label class="form-check-label" for="activo">Activo</label>
            </div>

            <button type="submit" class="btn btn-primary">Registrar</button>
        </form>


        <div class="card text-center m-100 border-dark d-none" id="tarjeta">
            <div class="card-header bg-secondary text-white fw-bold">
                Producto
            </div>
            <div class="card-body text-align-left">
                <!-- Añadiremos cada propiedad del objeto producto -->
                <p id="resultado"></p>
            </div>
            <div class="card-footer text-body-secondary">
                <div class="mb-3 fw-bold">Propiedades</div>
                <button type="button" class="btn btn-primary" id="anadir">Añadir</button>
                <button type="button" class="btn btn-warning" id="actualizar">Actualizar</button>
                <button type="button" class="btn btn-danger" id="eliminar">Eliminar</button>

                <div class="d-flex justify-content-center align-items-center gap-3 mt-3 d-none" id="propiedades_nuevas">
                    <div class="mb-3">
                        <label for="propiedad_nom" class="form-label">Nombre Propiedad</label>
                        <input name="propiedad_nom" class="form-control" id="propiedad_nom">
                    </div>

                    <div class="mb-3">
                        <label for="propiedad_value" class="form-label">Valor Propiedad</label>
                        <input name="propiedad_value" class="form-control" id="propiedad_value">
                    </div>
                    <button class="btn btn-primary" type="submit" id="enviar">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="gestion.js"></script>
</body>

</html>
