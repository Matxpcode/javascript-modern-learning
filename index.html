<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex justify-content-center align-items-center vh-100">
        <!-- tarjeta de resultados -->
        <div class="card d-none">
            <div class="card-header">
                Resultados
            </div>
            <div class="card-body">
                <h5 class="card-title">Special title treatment</h5>
                <p class="card-text">With supporting text below as a natural lead-in to additional content.</p>
                <a href="#" class="btn btn-primary">Go somewhere</a>
            </div>
        </div>

        <form class="border p-4 rounded bg-light">
            <!-- contenedor nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input class="form-control" id="nombre">
            </div>

            <!-- contenedor precio producto  -->
            <div class="mb-3">
                <label for="precio_producto" class="form-label">Precio Producto</label>
                <input class="form-control" id="precio">
            </div>

            <!-- contenedor de tipo de cliente: vip, regular y nuevo -->
            <div class="mb-3">
                <div class="dropdown">
                    <p>Tipo de Cliente</p>
                    <button id="desplegable" class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        -- Elige una Opcion --
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item active" href="#">Vip</a></li>
                        <li><a class="dropdown-item" href="#">Regular</a></li>
                        <li><a class="dropdown-item" href="#">Nuevo</a></li>
                    </ul>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="dinamica.js"></script>
</body>

</html>
