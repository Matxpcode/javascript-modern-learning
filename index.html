<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex justify-content-center align-items-center vh-100">
        <!-- tarjeta de resultados -->
        <div class="card d-none" id="tarjeta">
            <div class="card-header fw-bold">
                Resultados
            </div>
            <!-- Alerta de exito -->
            <div class="alert alert-success d-none" role="alert" id="alerta_completada">
                Cliente Registrado Exitosamente!
            </div>
            <div class="card-body">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">Nombre: <span id="result_nombre"></span></li>
                    <li class="list-group-item">Precio: <span id="result_precio"></span></li>
                    <li class="list-group-item">Tipo: <span id="result_tipo"></span></li>
                    <li class="list-group-item fw-bold">Descuento(-%): <span id="descuento"></span></li>
                    <li class="list-group-item fw-bolder fs-5 text-primary">Total: <span id="total"></span></li>
                </ul>
            </div>
        </div>

        <form class="border p-4 rounded bg-light" id="formulario">
            <!-- Alerta de nombre vacio -->
            <div class="alert alert-warning" role="alert" id="alerta_nombre">
                Nombre no debe estar vacio
            </div>

            <!-- contenedor nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input class="form-control" id="nombre"> <!--Messi-->
            </div>

            <!-- Alerta de precio>0 -->
            <div class="alert alert-warning" role="alert" id="alerta_precio">
                El precio debe ser mayor a 0
            </div>
            <!-- contenedor precio producto  -->
            <div class="mb-3">
                <label for="precio_producto" class="form-label">Precio Producto</label>
                <input class="form-control" id="precio">
            </div>

            <!-- Alerta de opcion valida -->
            <div class="alert alert-warning" role="alert" id="alerta_tipo">
                Escoja un tipo valido
            </div>
            <!-- contenedor de tipo de cliente: vip, regular y nuevo -->
            <div class="mb-3">
                <div class="dropdown">
                    <p>Tipo de Cliente</p>
                    <button id="desplegable" class="btn btn-secondary dropdown-toggle" type="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        -- Elige una Opcion --
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item active" href="#">nuevo</a></li>
                        <li><a class="dropdown-item" href="#">regular</a></li>
                        <li><a class="dropdown-item" href="#">vip</a></li>
                    </ul>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="dinamica.js"></script>
</body>

</html>
